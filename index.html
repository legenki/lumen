<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body class="theme-light">
  <div class="lumen-app">

    <aside class="sidebar lumen-sidebar-left">
      <div class="sidebar-content" id="lm-left"></div>
      <footer class="sidebar-footer">
        <button id="lm-btn-save-png" class="btn btn-accent">Export as PNG</button>
        <div class="btn-group" style="display:grid;grid-template-columns:1fr auto;gap:8px;">
          <button id="lm-btn-save-mp4" class="btn btn-secondary">Export as MP4</button>
          <select id="lm-mp4-length" class="grafema-select" style="min-width:64px;" title="Video length">
            <option value="2">2s</option><option value="4" selected>4s</option>
            <option value="6">6s</option><option value="8">8s</option>
            <option value="10">10s</option><option value="15">15s</option>
          </select>
        </div>
        <div id="lm-export-status" class="export-status"></div>
      </footer>
    </aside>

    <main class="lumen-canvas-viewport" id="lumen-canvas">
      <!-- p5.js canvas injected here -->
    </main>

    <aside class="sidebar right-sidebar">
      <div class="sidebar-content" id="lm-inspector">
        <p class="inspector-empty" style="opacity:.5;padding:12px;font-size:12px;">
          Select a layer to edit its parameters
        </p>
      </div>
    </aside>

  </div>
  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
